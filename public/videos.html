<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فيديوهات | أخبار اليوم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0d0d14;
  --paper: #f4f0e8;
  --cream: #ede8dc;
  --red: #c0392b;
  --gold: #c9920a;
  --gold-light: #e0a800;
  --gray: #6b6560;
  --border: #ccc4b4;
  --white: #fdfaf4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--paper); color:var(--ink); }

/* HEADER */
.site-header { background:var(--ink); }
.top-bar { background:var(--red); padding:5px 24px; display:flex; justify-content:space-between; font-family:'Tajawal',sans-serif; font-size:12px; color:#fff; }
.header-main { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; }
.logo-title { font-size:30px; font-weight:900; color:#fff; cursor:pointer; }
.logo-title span { color:var(--gold-light); }
.nav-links { display:flex; gap:6px; }
.nav-btn { padding:8px 16px; border:none; font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; }
.nav-btn.outline { background:transparent; color:rgba(255,255,255,.7); border:1px solid rgba(255,255,255,.2); }
.nav-btn.outline:hover { background:rgba(255,255,255,.1); color:#fff; }
.nav-btn.active { background:var(--gold-light); color:var(--ink); }

/* CONTAINER */
.container { max-width:1260px; margin:0 auto; padding:24px 16px; }

/* SEC HEADER */
.sec-head { display:flex; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:10px; border-bottom:2px solid var(--ink); }
.sec-title { font-size:20px; font-weight:900; }
.sec-line { flex:1; height:1px; background:var(--border); }
.sec-count { font-size:12px; color:var(--gray); font-family:'Tajawal',sans-serif; }

/* FILTER */
.filter-bar { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.filter-btn { padding:7px 16px; border:1px solid var(--border); background:var(--white); font-family:'Cairo',sans-serif; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; color:var(--ink); }
.filter-btn:hover { background:var(--ink); color:#fff; border-color:var(--ink); }
.filter-btn.active { background:var(--ink); color:#fff; border-color:var(--ink); }

/* VIDEO GRID */
.video-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }

.video-card {
  background:var(--white); border:1px solid var(--border);
  overflow:hidden; cursor:pointer; transition:all .25s;
}
.video-card:hover { transform:translateY(-3px); box-shadow:0 10px 28px rgba(0,0,0,.12); border-color:var(--gold); }

.thumb-wrap { position:relative; aspect-ratio:16/9; overflow:hidden; background:#000; }
.thumb-wrap img { width:100%; height:100%; object-fit:cover; transition:transform .3s; }
.video-card:hover .thumb-wrap img { transform:scale(1.05); }
.play-btn {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,.3); opacity:0; transition:opacity .3s;
}
.video-card:hover .play-btn { opacity:1; }
.play-icon {
  width:54px; height:54px; background:rgba(255,255,255,.95); border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:22px;
}
.duration-badge {
  position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,.8);
  color:#fff; padding:2px 6px; font-size:11px; font-family:'Tajawal',sans-serif;
}
.channel-badge {
  position:absolute; top:8px; right:8px; background:var(--red);
  color:#fff; padding:3px 8px; font-size:11px; font-weight:700; font-family:'Tajawal',sans-serif;
}

.video-info { padding:14px; }
.video-title {
  font-size:14px; font-weight:700; line-height:1.55;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  margin-bottom:10px;
}
.video-meta { display:flex; justify-content:space-between; font-size:11px; color:var(--gray); font-family:'Tajawal',sans-serif; }
.video-channel { font-weight:700; color:var(--gold); }

/* SKELETON */
.skel-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
.skel { background:var(--white); border:1px solid var(--border); }
.skel-thumb { aspect-ratio:16/9; }
.skel-body { padding:14px; }
.skel-line { height:13px; margin-bottom:8px; border-radius:2px; }
.skel-line.s { width:55%; }
.sh { background:linear-gradient(90deg,var(--cream) 25%,#ddd 50%,var(--cream) 75%); background-size:300% 100%; animation:sh 1.4s infinite; }
@keyframes sh { 0%{background-position:300% 0} 100%{background-position:-300% 0} }

/* ERROR */
.err-box { background:#fff5f5; border:1px solid #f5c6c6; padding:40px; text-align:center; }
.err-box h3 { font-size:18px; margin-bottom:8px; color:var(--red); }
.err-box p { font-size:14px; color:var(--gray); font-family:'Tajawal',sans-serif; }

/* FOOTER */
footer { background:var(--ink); color:rgba(255,255,255,.4); text-align:center; padding:24px; font-size:13px; font-family:'Tajawal',sans-serif; margin-top:40px; }
footer strong { color:var(--gold-light); }

@media(max-width:600px) { .video-grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<header class="site-header">
  <div class="top-bar">
    <span>🎬 فيديوهات الأخبار</span>
    <span id="top-date"></span>
  </div>
  <div class="header-main">
    <div class="logo-title" onclick="location.href='/'">أخبار<span>اليوم</span></div>
    <div class="nav-links">
      <button class="nav-btn outline" onclick="location.href='/'">📰 الأخبار</button>
      <button class="nav-btn active">🎬 فيديوهات</button>
    </div>
  </div>
</header>

<div class="container">
  <div class="sec-head">
    <div class="sec-title">🎬 آخر الفيديوهات</div>
    <div class="sec-line"></div>
    <div class="sec-count" id="vid-count"></div>
  </div>

  <!-- FILTER -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" onclick="filterChannel('all', this)">الكل</button>
    <button class="filter-btn" onclick="filterChannel('الجزيرة', this)">📺 الجزيرة</button>
    <button class="filter-btn" onclick="filterChannel('العربية', this)">🎥 العربية</button>
    <button class="filter-btn" onclick="filterChannel('سكاي نيوز عربية', this)">📡 سكاي نيوز</button>
    <button class="filter-btn" onclick="filterChannel('BBC عربي', this)">🌐 BBC عربي</button>
  </div>

  <div id="video-feed">
    <div class="skel-grid">
      ${Array(8).fill(0).map(()=>`
      <div class="skel">
        <div class="skel-thumb sh"></div>
        <div class="skel-body">
          <div class="skel-line sh"></div>
          <div class="skel-line sh"></div>
          <div class="skel-line sh s"></div>
        </div>
      </div>`).join('')}
    </div>
  </div>
</div>

<footer>
  <strong>أخبار اليوم</strong> — فيديوهات من قنوات أخبار عربية<br>
  <small>يتم تحديث الفيديوهات تلقائياً كل 30 دقيقة</small>
</footer>

<script>
let allVideos = [];
let currentChannel = 'all';

// date
const n = new Date();
document.getElementById('top-date').textContent = n.toLocaleDateString('ar-EG',{weekday:'short',day:'numeric',month:'long'});

function timeAgo(d) {
  if(!d) return '';
  const diff = (Date.now()-new Date(d))/1000;
  if(diff<3600) return `منذ ${Math.floor(diff/60)} دقيقة`;
  if(diff<86400) return `منذ ${Math.floor(diff/3600)} ساعة`;
  return `منذ ${Math.floor(diff/86400)} يوم`;
}

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

function renderVideos(videos) {
  if (!videos.length) {
    document.getElementById('video-feed').innerHTML = `
      <div class="err-box">
        <h3>😕 لا توجد فيديوهات</h3>
        <p>جرب قناة أخرى أو انتظر التحديث التلقائي</p>
      </div>`;
    return;
  }

  document.getElementById('vid-count').textContent = `${videos.length} فيديو`;
  document.getElementById('video-feed').innerHTML = `<div class="video-grid">
    ${videos.map(v => `
    <div class="video-card" onclick="location.href='/video/${esc(v.id)}'">
      <div class="thumb-wrap">
        <img src="${esc(v.thumbnail)}" alt="${esc(v.title)}" loading="lazy" onerror="this.src='https://i.ytimg.com/vi/${esc(v.id)}/hqdefault.jpg'">
        <div class="play-btn"><div class="play-icon">▶</div></div>
        <div class="channel-badge">${esc(v.channelIcon)} ${esc(v.channel)}</div>
      </div>
      <div class="video-info">
        <div class="video-title">${esc(v.title)}</div>
        <div class="video-meta">
          <span class="video-channel">${esc(v.channel)}</span>
          <span>${timeAgo(v.published)}</span>
        </div>
      </div>
    </div>`).join('')}
  </div>`;
}

function filterChannel(channel, btn) {
  currentChannel = channel;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = channel === 'all' ? allVideos : allVideos.filter(v => v.channel === channel);
  renderVideos(filtered);
}

async function loadVideos() {
  try {
    const res = await fetch('/api/videos');
    const data = await res.json();
    if (!data.success || !data.videos?.length) throw new Error('no videos');
    allVideos = data.videos;
    renderVideos(allVideos);
  } catch(e) {
    document.getElementById('video-feed').innerHTML = `
      <div class="err-box">
        <h3>⚠️ تعذّر تحميل الفيديوهات</h3>
        <p>تأكد من اتصال السيرفر وحاول مرة أخرى</p>
      </div>`;
  }
}

loadVideos();
</script>
</body>
</html>
