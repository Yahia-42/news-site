<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مشاهدة الفيديو | أخبار اليوم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0d0d14;
  --paper: #f4f0e8;
  --cream: #ede8dc;
  --red: #c0392b;
  --gold: #c9920a;
  --gold-light: #e0a800;
  --gray: #6b6560;
  --border: #ccc4b4;
  --white: #fdfaf4;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Cairo',sans-serif; background:var(--paper); color:var(--ink); }

.site-header { background:var(--ink); }
.header-main { display:flex; align-items:center; justify-content:space-between; padding:16px 24px; }
.logo-title { font-size:28px; font-weight:900; color:#fff; cursor:pointer; }
.logo-title span { color:var(--gold-light); }
.back-btn { padding:8px 16px; background:transparent; color:rgba(255,255,255,.7); border:1px solid rgba(255,255,255,.2); font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; }
.back-btn:hover { background:rgba(255,255,255,.1); color:#fff; }

.container { max-width:1000px; margin:0 auto; padding:30px 16px; }

/* PLAYER */
.player-wrap {
  background:#000; width:100%; aspect-ratio:16/9;
  position:relative; margin-bottom:20px;
}
.player-wrap iframe { width:100%; height:100%; border:none; }

/* VIDEO INFO */
.video-info-box { background:var(--white); border:1px solid var(--border); padding:24px; margin-bottom:20px; }
.video-page-title { font-size:22px; font-weight:900; line-height:1.4; margin-bottom:12px; }
.video-page-meta { display:flex; align-items:center; gap:14px; font-size:13px; color:var(--gray); font-family:'Tajawal',sans-serif; flex-wrap:wrap; }
.meta-channel { font-weight:700; color:var(--gold); font-size:14px; }
.video-desc { margin-top:14px; font-size:14px; color:var(--gray); line-height:1.8; font-family:'Tajawal',sans-serif; border-top:1px solid var(--cream); padding-top:14px; }

/* SHARE */
.share-box { background:var(--white); border:1px solid var(--border); padding:18px 24px; margin-bottom:20px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.share-label { font-weight:700; font-size:14px; }
.share-btn { padding:8px 16px; border:none; font-family:'Cairo',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:6px; }
.share-tg { background:#229ED9; color:#fff; }
.share-tg:hover { background:#1a7ab8; }
.share-copy { background:var(--ink); color:#fff; }
.share-copy:hover { background:var(--red); }

/* RELATED */
.sec-head { display:flex; align-items:center; gap:12px; margin-bottom:16px; padding-bottom:10px; border-bottom:2px solid var(--ink); }
.sec-title { font-size:18px; font-weight:900; }
.sec-line { flex:1; height:1px; background:var(--border); }

.related-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:12px; }
.related-card { background:var(--white); border:1px solid var(--border); cursor:pointer; overflow:hidden; transition:all .2s; }
.related-card:hover { transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.1); border-color:var(--gold); }
.related-thumb { position:relative; aspect-ratio:16/9; overflow:hidden; background:#000; }
.related-thumb img { width:100%; height:100%; object-fit:cover; }
.related-play { position:absolute; inset:0; background:rgba(0,0,0,.3); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .2s; }
.related-card:hover .related-play { opacity:1; }
.play-sm { width:36px; height:36px; background:rgba(255,255,255,.9); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; }
.related-info { padding:10px; }
.related-title { font-size:12px; font-weight:700; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:6px; }
.related-ch { font-size:11px; color:var(--gold); font-weight:700; font-family:'Tajawal',sans-serif; }

footer { background:var(--ink); color:rgba(255,255,255,.4); text-align:center; padding:24px; font-size:13px; font-family:'Tajawal',sans-serif; margin-top:40px; }
footer strong { color:var(--gold-light); }

@media(max-width:600px) { .container{padding:16px 10px} .video-page-title{font-size:18px} }
</style>
</head>
<body>

<header class="site-header">
  <div class="header-main">
    <button class="back-btn" onclick="location.href='/videos.html'">← الفيديوهات</button>
    <div class="logo-title" onclick="location.href='/'">أخبار<span>اليوم</span></div>
  </div>
</header>

<div class="container">
  <!-- PLAYER -->
  <div class="player-wrap" id="player-wrap">
    <iframe id="yt-player" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>

  <!-- INFO -->
  <div class="video-info-box" id="video-info">
    <div class="video-page-title" id="v-title">جاري التحميل...</div>
    <div class="video-page-meta">
      <span class="meta-channel" id="v-channel"></span>
      <span id="v-date"></span>
    </div>
    <div class="video-desc" id="v-desc"></div>
  </div>

  <!-- SHARE -->
  <div class="share-box">
    <span class="share-label">📤 شارك الفيديو:</span>
    <button class="share-btn share-tg" onclick="shareOnTelegram()">✈️ Telegram</button>
    <button class="share-btn share-copy" onclick="copyLink()">🔗 نسخ الرابط</button>
  </div>

  <!-- RELATED -->
  <div class="sec-head">
    <div class="sec-title">🎬 فيديوهات أخرى</div>
    <div class="sec-line"></div>
  </div>
  <div class="related-grid" id="related-grid"></div>
</div>

<footer>
  <strong>أخبار اليوم</strong> — فيديوهات أخبار عربية
</footer>

<script>
const videoId = location.pathname.split('/video/')[1];
let currentVideo = null;

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function timeAgo(d) {
  if(!d) return '';
  const diff=(Date.now()-new Date(d))/1000;
  if(diff<3600) return `منذ ${Math.floor(diff/60)} دقيقة`;
  if(diff<86400) return `منذ ${Math.floor(diff/3600)} ساعة`;
  return `منذ ${Math.floor(diff/86400)} يوم`;
}

function shareOnTelegram() {
  const url = encodeURIComponent(location.href);
  const text = encodeURIComponent(currentVideo?.title || 'شاهد هذا الفيديو');
  window.open(`https://t.me/share/url?url=${url}&text=${text}`, '_blank');
}

function copyLink() {
  navigator.clipboard.writeText(location.href).then(() => {
    alert('تم نسخ الرابط ✅');
  });
}

async function loadVideo() {
  if (!videoId) { location.href = '/videos.html'; return; }

  // شغّل البلاير فوراً
  document.getElementById('yt-player').src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;

  try {
    const res = await fetch('/api/videos');
    const data = await res.json();
    if (!data.success) return;

    const videos = data.videos;
    currentVideo = videos.find(v => v.id === videoId);

    if (currentVideo) {
      document.title = `${currentVideo.title} | أخبار اليوم`;
      document.getElementById('v-title').textContent = currentVideo.title;
      document.getElementById('v-channel').textContent = `${currentVideo.channelIcon} ${currentVideo.channel}`;
      document.getElementById('v-date').textContent = timeAgo(currentVideo.published);
      document.getElementById('v-desc').textContent = currentVideo.description || '';
    }

    // فيديوهات ذات صلة
    const related = videos.filter(v => v.id !== videoId).slice(0, 8);
    document.getElementById('related-grid').innerHTML = related.map(v => `
      <div class="related-card" onclick="location.href='/video/${esc(v.id)}'">
        <div class="related-thumb">
          <img src="${esc(v.thumbnail)}" alt="${esc(v.title)}" loading="lazy">
          <div class="related-play"><div class="play-sm">▶</div></div>
        </div>
        <div class="related-info">
          <div class="related-title">${esc(v.title)}</div>
          <div class="related-ch">${esc(v.channelIcon)} ${esc(v.channel)} • ${timeAgo(v.published)}</div>
        </div>
      </div>`).join('');

  } catch(e) {
    console.error('خطأ في تحميل بيانات الفيديو');
  }
}

loadVideo();
</script>
</body>
</html>
